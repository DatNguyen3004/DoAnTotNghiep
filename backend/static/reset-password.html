<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - NuLabel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Inter,sans-serif; }
        body { background:#F8FAFC; display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .card { background:#fff; border-radius:12px; box-shadow:0 4px 24px rgba(0,0,0,0.08); border:1px solid #E2E8F0; padding:40px; width:100%; max-width:420px; }
        .logo { text-align:center; margin-bottom:28px; }
        .logo h1 { color:#2563EB; font-size:24px; font-weight:800; margin-top:8px; }
        h2 { font-size:20px; font-weight:800; color:#1E293B; margin-bottom:6px; }
        p { font-size:13px; color:#64748B; margin-bottom:24px; }
        label { display:block; font-size:12px; font-weight:700; color:#64748B; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
        .input-wrap { position:relative; margin-bottom:16px; }
        input[type=password] { width:100%; height:44px; padding:0 44px 0 14px; border:1px solid #E2E8F0; border-radius:8px; font-size:14px; color:#1E293B; outline:none; transition:border 0.2s; }
        input[type=password]:focus { border-color:#2563EB; }
        .toggle-pw { position:absolute; right:14px; top:50%; transform:translateY(-50%); cursor:pointer; color:#94A3B8; font-size:15px; }
        .btn { width:100%; height:44px; background:#2563EB; color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:700; cursor:pointer; transition:all 0.2s; margin-top:8px; }
        .btn:hover { background:#1D4ED8; }
        .btn:disabled { background:#94A3B8; cursor:not-allowed; }
        .alert { padding:12px 16px; border-radius:8px; font-size:13px; font-weight:600; margin-bottom:16px; display:none; align-items:center; gap:8px; }
        .alert-error { background:#FEF2F2; border:1px solid #FECACA; color:#DC2626; }
        .alert-success { background:#F0FDF4; border:1px solid #BBF7D0; color:#16A34A; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <img src="image/NuLabel-removebg-preview.png" width="50" height="40">
        <h1>NuLabel</h1>
    </div>
    <h2>Đặt lại mật khẩu</h2>
    <p>Nhập mật khẩu mới cho tài khoản của bạn.</p>

    <div id="alertError" class="alert alert-error"><i class="fa-solid fa-circle-xmark"></i><span id="alertErrorMsg"></span></div>
    <div id="alertSuccess" class="alert alert-success"><i class="fa-solid fa-circle-check"></i><span>Đặt lại mật khẩu thành công! Đang chuyển về trang đăng nhập...</span></div>

    <div id="formWrap">
        <div>
            <label>Mật khẩu mới</label>
            <div class="input-wrap">
                <input type="password" id="newPass" placeholder="Tối thiểu 6 ký tự" autocomplete="new-password">
                <i class="fa-regular fa-eye toggle-pw" onclick="togglePw('newPass',this)"></i>
            </div>
        </div>
        <div>
            <label>Xác nhận mật khẩu mới</label>
            <div class="input-wrap">
                <input type="password" id="confirmPass" placeholder="Nhập lại mật khẩu mới" autocomplete="new-password">
                <i class="fa-regular fa-eye toggle-pw" onclick="togglePw('confirmPass',this)"></i>
            </div>
        </div>
        <button class="btn" id="btnSubmit" onclick="submitReset()">
            <i class="fa-solid fa-check"></i> Xác nhận
        </button>
    </div>
</div>

<script>
const token = new URLSearchParams(window.location.search).get('token');
if (!token) {
    document.getElementById('alertError').style.display = 'flex';
    document.getElementById('alertErrorMsg').textContent = 'Link không hợp lệ hoặc đã hết hạn.';
    document.getElementById('formWrap').style.display = 'none';
}

function togglePw(id, icon) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
    icon.classList.toggle('fa-eye');
    icon.classList.toggle('fa-eye-slash');
}

async function submitReset() {
    const newPass = document.getElementById('newPass').value;
    const confirm = document.getElementById('confirmPass').value;
    const errEl = document.getElementById('alertError');
    const errMsg = document.getElementById('alertErrorMsg');

    errEl.style.display = 'none';
    if (!newPass || newPass.length < 6) {
        errMsg.textContent = 'Mật khẩu phải có ít nhất 6 ký tự';
        errEl.style.display = 'flex'; return;
    }
    if (newPass !== confirm) {
        errMsg.textContent = 'Mật khẩu xác nhận không khớp';
        errEl.style.display = 'flex'; return;
    }

    const btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang xử lý...';

    try {
        const res = await fetch('http://localhost:8000/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, new_password: newPass })
        });
        if (!res.ok) {
            const err = await res.json();
            errMsg.textContent = err.detail || 'Token không hợp lệ hoặc đã hết hạn';
            errEl.style.display = 'flex';
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Xác nhận';
            return;
        }
        document.getElementById('formWrap').style.display = 'none';
        document.getElementById('alertSuccess').style.display = 'flex';
        setTimeout(() => window.location.href = 'login.html', 2500);
    } catch(e) {
        errMsg.textContent = 'Lỗi kết nối, vui lòng thử lại';
        errEl.style.display = 'flex';
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-check"></i> Xác nhận';
    }
}
</script>
</body>
</html>
