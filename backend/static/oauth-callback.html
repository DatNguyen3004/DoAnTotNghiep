<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đang đăng nhập...</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #F8FAFC;
            color: #334155;
        }
        .box {
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #E2E8F0;
            border-top-color: #2563EB;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { font-size: 14px; font-weight: 600; color: #64748B; }
    </style>
</head>
<body>
    <div class="box">
        <div class="spinner"></div>
        <p>Đang xử lý đăng nhập...</p>
    </div>
    <script>
        (async function () {
            const params = new URLSearchParams(window.location.search);
            const token  = params.get('token');
            const role   = params.get('role');
            const error  = params.get('error');

            if (error || !token) {
                alert('Đăng nhập thất bại: ' + (error || 'Không nhận được token'));
                window.location.href = '/login.html';
                return;
            }

            localStorage.setItem('access_token', token);

            // Lấy thông tin user đầy đủ
            try {
                const res = await fetch('http://localhost:8000/api/auth/me', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.ok) {
                    const user = await res.json();
                    localStorage.setItem('current_user', JSON.stringify(user));
                }
            } catch (e) {
                // bỏ qua, vẫn redirect
            }

            if (role === 'admin') {
                window.location.href = '/static/Admin/ManagerProject.html';
            } else {
                window.location.href = '/static/User/ManagerProject.html';
            }
        })();
    </script>
</body>
</html>
