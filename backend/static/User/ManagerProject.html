<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dự án của tôi - NuLabel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/ManagerProject.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-left">
            <a href="#" class="nav-brand">
                <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="64" height="64" rx="12" fill="#3B5784" />
                    <path d="M22 18H36C44 18 48 24 48 32C48 40 44 46 36 46H22V18Z" stroke="#FFFFFF" stroke-width="4"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <span class="brand-text">NuLabel</span>
            </a>
        </div>

        <div class="nav-right">
            <i class="fa-regular fa-bell nav-icon"></i>
            <img src="https://api.dicebear.com/7.x/notionists/svg?seed=Felix&backgroundColor=e2e8f0"
                alt="User Profile" class="user-avatar">
            <div style="width:1px;height:24px;background:var(--border-color);margin:0 4px;"></div>
            <button class="btn-logout" id="btnLogout">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Đăng xuất
            </button>
        </div>
    </nav>

    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Dự án của tôi</h1>
            <p class="page-subtitle">Chọn dự án để xem và thực hiện nhiệm vụ gán nhãn</p>
        </div>

        <div class="actions-row">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" placeholder="Tìm kiếm dự án...">
            </div>
        </div>

        <div class="project-grid" id="projectGrid">
            <!-- Projects loaded from API -->
        </div>
    </main>

    <script>
        const BASE_URL = 'http://localhost:8000/api';
        function getToken() { return localStorage.getItem('access_token'); }

        // Auth guard
        const user = JSON.parse(localStorage.getItem('current_user') || '{}');
        if (!getToken() || user.role !== 'user') {
            window.location.href = '../login.html';
        }

        // Logout
        document.getElementById('btnLogout').addEventListener('click', async () => {
            try { await fetch(`${BASE_URL}/auth/logout`, { method: 'POST', headers: { Authorization: `Bearer ${getToken()}` } }); } catch (e) { }
            localStorage.removeItem('access_token');
            localStorage.removeItem('current_user');
            window.location.href = '../login.html';
        });

        const banners = ['bg-dark', 'bg-network', 'bg-teal'];
        const bannerHTML = {
            'bg-dark': `<div class="badge-design"><div class="badge-text1">PROJECT</div><div class="badge-text2">NULABEL</div></div>`,
            'bg-network': `<div class="network-pattern"></div>`,
            'bg-teal': `<div class="teal-overlay"></div><div class="cursive-logo">NuLabel Dataset</div>`
        };

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return `${d.getDate()} Th${d.getMonth() + 1}, ${d.getFullYear()}`;
        }

        function renderProjects(projects) {
            const grid = document.getElementById('projectGrid');
            if (!projects.length) {
                grid.innerHTML = '<p style="color:#94A3B8;padding:24px;">Bạn chưa được thêm vào dự án nào.</p>';
                return;
            }
            grid.innerHTML = projects.map((p, i) => {
                const banner = banners[i % banners.length];
                const bannerContent = p.cover_image
                    ? `<img src="${p.cover_image}" style="width:100%;height:100%;object-fit:cover;">`
                    : bannerHTML[banner];
                const bannerClass = p.cover_image ? '' : banner;
                return `
                <div class="project-card" onclick="selectProject(${p.id}, '${p.name.replace(/'/g, "\\'")}')">
                    <div class="card-banner ${bannerClass}">${bannerContent}</div>
                    <div class="card-content">
                        <h2 class="card-title">${p.name}</h2>
                        <p class="card-desc">${p.description || 'Không có mô tả.'}</p>
                        <div class="card-footer">
                            <i class="fa-regular fa-calendar"></i>
                            <span>${formatDate(p.created_at)}</span>
                            ${p.scene_count > 0
                                ? `<span style="margin-left:8px;background:#DBEAFE;color:#2563EB;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700">${p.scene_count} nhiệm vụ</span>`
                                : `<span style="margin-left:8px;background:#FEF3C7;color:#D97706;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700">Chưa có data</span>`
                            }
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function selectProject(id, name) {
            sessionStorage.setItem('projectId', id);
            sessionStorage.setItem('projectName', name);
            window.location.href = 'dashboard.html';
        }

        async function loadProjects() {
            try {
                const res = await fetch(`${BASE_URL}/projects`, {
                    headers: { Authorization: `Bearer ${getToken()}` }
                });
                if (!res.ok) throw new Error();
                const projects = await res.json();
                renderProjects(projects);
            } catch (e) {
                document.getElementById('projectGrid').innerHTML =
                    '<p style="color:#EF4444;padding:24px;">Không thể tải danh sách dự án.</p>';
            }
        }

        // Search
        document.querySelector('.search-box input').addEventListener('input', function () {
            const q = this.value.toLowerCase();
            document.querySelectorAll('.project-card').forEach(card => {
                const title = card.querySelector('.card-title').textContent.toLowerCase();
                card.style.display = title.includes(q) ? '' : 'none';
            });
        });

        loadProjects();
    </script>

</body>
</html>
