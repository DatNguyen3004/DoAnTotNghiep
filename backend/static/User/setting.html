<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cài đặt</title>
    <link rel="icon" type="image/png" href="/static/image/NuLabel-removebg-preview.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../Admin/css/dashboard.css">
    <link rel="stylesheet" href="../Admin/css/setting.css">
</head>
<body>

<main class="main-wrapper" id="mainWrapper">

    <div id="sidebar-container"></div>

    <header class="topnav">
        <div class="topnav-brand">
            <img src="../image/NuLabel-removebg-preview.png" width="40" height="30">
            <span style="padding-left: 10px;">NuLabel</span>
        </div>
        <div class="topnav-right">
            <img src="" alt="Avatar" class="avatar">
        </div>
    </header>

    <div class="settings-container">
        <div class="page-header">
            <h1>Cài đặt</h1>
            <p>Cấu hình thông số AI cho phiên làm việc của bạn</p>
        </div>

        <div class="settings-card">
            <div class="settings-card-header">
                <div class="settings-card-icon blue">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <div>
                    <div class="settings-card-title">Cài đặt AI</div>
                    <div class="settings-card-desc">Điều chỉnh ngưỡng tin cậy cho mô hình YOLOv8 khi gán nhãn tự động</div>
                </div>
            </div>

            <div class="setting-row">
                <div class="setting-label">
                    <div class="setting-label-title">Ngưỡng cần kiểm tra (Review Threshold)</div>
                    <div class="setting-label-desc">Nhãn AI có độ tin cậy thấp hơn ngưỡng này sẽ được gắn cờ đỏ để ưu tiên kiểm tra lại.</div>
                </div>
                <div class="setting-control">
                    <div class="slider-wrap">
                        <input type="range" id="aiReviewThreshold" min="1" max="100" value="85"
                            oninput="updateSlider('aiReviewThreshold', 'aiReviewThresholdVal', 100)">
                        <span class="slider-value" id="aiReviewThresholdVal">0.85</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-row">
            <button class="btn-save" onclick="saveSettings()">
                <i class="fa-solid fa-floppy-disk"></i> Lưu cài đặt
            </button>
            <button class="btn-reset" onclick="resetSettings()">
                <i class="fa-solid fa-rotate-left"></i> Khôi phục mặc định
            </button>
            <div class="saved-badge" id="savedBadge">
                <i class="fa-solid fa-circle-check"></i> Đã lưu
            </div>
        </div>
    </div>

</main>

<script src="../js/sidebar.js"></script>
<script src="../js/avatar-sync.js"></script>
<script src="../js/user-setting.js?v=2"></script>
</body>
</html>
