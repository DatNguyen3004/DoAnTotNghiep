<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NuLabel</title>
    <link rel="icon" type="image/png" href="/static/image/NuLabel-removebg-preview.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../Admin/css/dashboard.css">
    <script src="../js/confirm.js"></script>
    <style>
        .content-area { flex:1; overflow-y:auto; padding:32px; background:#F8FAFC; }
        .page-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
        .page-title { font-size:20px; font-weight:800; color:#1E293B; }
        .page-subtitle { font-size:13px; color:#64748B; margin-top:4px; }
        .page-badge { padding:6px 14px; border-radius:20px; font-size:12px; font-weight:700; align-self:flex-start; }
        .badge-fix { background:#FEE2E2; color:#DC2626; }
        .badge-review { background:#F5F3FF; color:#7C3AED; }
        .frame-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; margin-bottom:32px; }
        .frame-card { background:#fff; border-radius:12px; border:1px solid #E2E8F0; overflow:hidden; transition:box-shadow 0.2s; }
        .frame-card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.08); }
        .frame-card.done { opacity:0.4; }
        .frame-card.done-correct { border:2px solid #10B981; }
        .frame-card.done-wrong { border:2px solid #EF4444; }
        .frame-thumb { width:100%; height:150px; background:#0F172A; position:relative; overflow:hidden; }
        .frame-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
        .frame-num-badge { position:absolute; top:8px; left:8px; background:rgba(0,0,0,0.6); color:#fff; font-size:11px; font-weight:700; padding:3px 8px; border-radius:6px; }
        .status-badge-img { position:absolute; top:8px; right:8px; color:#fff; font-size:11px; font-weight:700; padding:3px 8px; border-radius:6px; display:flex; align-items:center; gap:4px; }
        /* Nút Đúng/Sai overlay trên ảnh */
        .thumb-review-btns { position:absolute; bottom:0; left:0; right:0; display:flex; gap:0; }
        .thumb-btn-correct { flex:1; height:36px; background:rgba(16,185,129,0.85); color:#fff; border:none; font-size:13px; font-weight:700; cursor:pointer; font-family:Inter,sans-serif; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:6px; backdrop-filter:blur(2px); }
        .thumb-btn-correct:hover, .thumb-btn-correct.active { background:rgba(16,185,129,1); }
        .thumb-btn-correct.active { box-shadow:inset 0 -3px 0 #059669; }
        .thumb-btn-wrong { flex:1; height:36px; background:rgba(239,68,68,0.85); color:#fff; border:none; font-size:13px; font-weight:700; cursor:pointer; font-family:Inter,sans-serif; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:6px; backdrop-filter:blur(2px); }
        .thumb-btn-wrong:hover, .thumb-btn-wrong.active { background:rgba(239,68,68,1); }
        .thumb-btn-wrong.active { box-shadow:inset 0 -3px 0 #DC2626; }
        .frame-body { padding:14px; }
        .frame-desc { font-size:13px; line-height:1.5; padding:8px 10px; border-radius:6px; margin-bottom:12px; border-left:3px solid; }
        .fix-desc { color:#7C2D12; background:#FEF2F2; border-color:#EF4444; }
        .review-desc { color:#4C1D95; background:#F5F3FF; border-color:#7C3AED; }
        .empty-desc { color:#94A3B8; background:#F8FAFC; border-color:#CBD5E1; font-style:italic; }
        .btn-action { width:100%; height:40px; border:none; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; font-family:Inter,sans-serif; transition:all 0.2s; text-decoration:none; }
        .btn-fix { background:#EF4444; color:#fff; }
        .btn-fix:hover { background:#DC2626; }
        .btn-check { background:#7C3AED; color:#fff; }
        .btn-check:hover { background:#6D28D9; }
        .feedback-input { width:100%; margin-top:8px; padding:8px 10px; border:1px solid #E2E8F0; border-radius:8px; font-size:12px; font-family:Inter,sans-serif; color:#1E293B; resize:none; outline:none; transition:border 0.2s; }
        .feedback-input:focus { border-color:#EF4444; }
        .bottom-bar { background:#fff; border-top:1px solid #E2E8F0; padding:16px 32px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .progress-info { font-size:13px; color:#64748B; }
        .progress-info strong { color:#1E293B; }
        .btn-submit-main { height:44px; padding:0 28px; background:linear-gradient(90deg,#2563EB,#7C3AED); color:#fff; border:none; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:8px; font-family:Inter,sans-serif; transition:all 0.2s; box-shadow:0 4px 12px rgba(37,99,235,0.3); }
        .btn-submit-main:hover { transform:translateY(-1px); }
        .btn-submit-main:disabled { background:#94A3B8; box-shadow:none; cursor:not-allowed; transform:none; }
        .empty-state { text-align:center; padding:80px 32px; color:#94A3B8; grid-column:1/-1; }
        .empty-state i { font-size:48px; display:block; margin-bottom:16px; color:#CBD5E1; }
        .empty-state h3 { font-size:18px; font-weight:700; color:#64748B; margin-bottom:8px; }
    </style>
</head>
<body>
<main class="main-wrapper" id="mainWrapper">

    <div id="sidebar-container"></div>

    <header class="topnav">
        <div class="topnav-brand">
            <img src="../image/NuLabel-removebg-preview.png" width="40" height="30">
            <span style="padding-left: 10px;">NuLabel</span>
        </div>
        <div class="topnav-right">
            <img src="" alt="Avatar" class="avatar">
        </div>
    </header>

    <div class="content-area">
        <div class="page-header">
            <div>
                <div class="page-title" id="pageTitle">Đang tải...</div>
                <div class="page-subtitle" id="pageSubtitle"></div>
            </div>
            <span class="page-badge" id="pageBadge"></span>
        </div>
        <div class="frame-grid" id="frameGrid">
            <div style="grid-column:1/-1;text-align:center;padding:60px;color:#94A3B8">
                <i class="fa-solid fa-spinner fa-spin" style="font-size:32px;display:block;margin-bottom:12px"></i>Đang tải...
            </div>
        </div>
    </div>

    <div class="bottom-bar" id="bottomBar" style="display:none">
        <div class="progress-info">Đã xử lý: <strong id="doneCount">0</strong> / <strong id="totalCount">0</strong></div>
        <button class="btn-submit-main" id="btnSubmit" onclick="submitTask()">
            <i class="fa-solid fa-paper-plane"></i><span id="btnSubmitLabel">Nộp lại</span>
        </button>
    </div>

</main>
<script>
const BASE_URL = 'http://localhost:8000/api';
function getToken() { return localStorage.getItem('access_token'); }
const currentUser = JSON.parse(localStorage.getItem('current_user') || '{}');
if (!getToken()) window.location.href = '../login.html';

const params = new URLSearchParams(window.location.search);
const taskId = params.get('taskId');
const mode = params.get('mode') || 'fix';
if (!taskId) window.location.href = 'dashboard.html';

const projectName = sessionStorage.getItem('projectName') || 'Trang chủ';
const storageKey = 'framelist_done_' + mode + '_' + taskId;
const reviewKey = 'framelist_review_' + taskId;

let doneFrames = {};
let reviewStates = {};
try { doneFrames = JSON.parse(localStorage.getItem(storageKey) || '{}'); } catch(e) {}
try { reviewStates = JSON.parse(localStorage.getItem(reviewKey) || '{}'); } catch(e) {}

let task = null, frames = [], frameEntries = [];

// Nếu chưa có projectId, fetch task để lấy project_id rồi inject sidebar
async function ensureSidebar() {
    if (!sessionStorage.getItem('projectId')) {
        try {
            const r = await fetch(BASE_URL + '/tasks/' + taskId, { headers: { Authorization: 'Bearer ' + getToken() } });
            if (r.ok) {
                const t = await r.json();
                if (t.project_id) sessionStorage.setItem('projectId', String(t.project_id));
            }
        } catch(e) {}
    }
    // Load sidebar.js dynamically sau khi projectId đã có
    if (!document.getElementById('_sidebarScript')) {
        const s = document.createElement('script');
        s.id = '_sidebarScript';
        s.src = '../js/sidebar.js';
        document.body.appendChild(s);
    }
}

ensureSidebar().then(function() { init(); });

async function init() {
    try {
        const r1 = await fetch(BASE_URL + '/tasks/' + taskId, { headers: { Authorization: 'Bearer ' + getToken() } });
        if (!r1.ok) throw new Error();
        task = await r1.json();

        // Đảm bảo projectId có trong sessionStorage để sidebar hoạt động
        if (task.project_id && !sessionStorage.getItem('projectId')) {
            sessionStorage.setItem('projectId', String(task.project_id));
            if (task.scene_name) sessionStorage.setItem('projectName', task.scene_name);
        }

        const r2 = await fetch(BASE_URL + '/scenes/' + task.scene_id + '/frames', { headers: { Authorization: 'Bearer ' + getToken() } });
        if (!r2.ok) throw new Error();
        frames = await r2.json();
        // Đánh dấu đang trong chế độ FrameList để disable nút tổng thể ở giao diện cũ
        localStorage.setItem('framelist_mode_' + taskId, mode);
        renderPage();
    } catch(e) {
        document.getElementById('frameGrid').innerHTML = '<div class="empty-state"><i class="fa-solid fa-circle-exclamation" style="color:#EF4444"></i><h3>Không thể tải dữ liệu</h3></div>';
    }
}

function renderPage() {
    const feedback = task.feedback || '';
    frameEntries = [];
    feedback.split('\n').filter(l => l.trim()).forEach(line => {
        // Match cả "Frame X:" và "Khung hình X:"
        const m = line.match(/(?:Frame|Khung hình)\s+(\d+)[:：](.*)/i);
        if (m) frameEntries.push({ frameNum: parseInt(m[1]), desc: m[2].trim() });
    });

    if (mode === 'fix') {
        document.getElementById('pageTitle').textContent = 'Khung hình cần sửa lỗi';
        document.getElementById('pageSubtitle').textContent = (task.scene_name || 'Nhiệm vụ #' + taskId) + ' — Sửa từng khung hình rồi nhấn Nộp lại';
        document.getElementById('pageBadge').textContent = frameEntries.length + ' khung hình lỗi';
        document.getElementById('pageBadge').className = 'page-badge badge-fix';
        document.getElementById('btnSubmitLabel').textContent = 'Nộp lại';
    } else {
        document.getElementById('pageTitle').textContent = 'Kiểm tra lại khung hình';
        document.getElementById('pageSubtitle').textContent = (task.scene_name || 'Nhiệm vụ #' + taskId) + ' — Đánh giá từng khung hình rồi nhấn Xác nhận';
        document.getElementById('pageBadge').textContent = frameEntries.length + ' khung hình';
        document.getElementById('pageBadge').className = 'page-badge badge-review';
        document.getElementById('btnSubmitLabel').textContent = 'Xác nhận';
    }

    if (!frameEntries.length) {
        document.getElementById('frameGrid').innerHTML = '<div class="empty-state"><i class="fa-solid fa-circle-check" style="color:#10B981"></i><h3>Không có khung hình nào cần xử lý</h3><p>Không có phản hồi lỗi từ người kiểm tra.</p></div>';
        return;
    }
    document.getElementById('bottomBar').style.display = 'flex';
    renderCards();
    updateProgress();
}

function renderCards() {
    const grid = document.getElementById('frameGrid');
    grid.innerHTML = frameEntries.map(function(entry) {
        const frameNum = entry.frameNum, desc = entry.desc;
        const frameIdx = frameNum - 1;
        const isDone = doneFrames[frameNum] === true;
        const rs = reviewStates[frameNum];
        const savedFb = reviewStates['fb_' + frameNum] || '';

        if (mode === 'fix') {
            return '<div class="frame-card ' + (isDone ? 'done' : '') + '" id="card_' + frameNum + '">' +
                '<div class="frame-thumb">' +
                '<img id="thumb_' + frameNum + '" src="" alt="Khung hình ' + frameNum + '">' +
                '<div class="frame-num-badge">Khung hình ' + frameNum + '</div>' +
                (isDone ? '<div class="status-badge-img" style="background:#10B981"><i class="fa-solid fa-check"></i> Đã sửa</div>' : '') +
                '</div>' +
                '<div class="frame-body">' +
                '<div class="frame-desc ' + (desc ? 'fix-desc' : 'empty-desc') + '">' + (desc || 'Không có mô tả') + '</div>' +
                '<a href="Label.html?taskId=' + taskId + '&frame=' + frameIdx + '&returnTo=FrameList&mode=fix" class="btn-action btn-fix" onclick="markVisited(' + frameNum + ')">' +
                '<i class="fa-solid fa-pen"></i> Sửa lỗi</a>' +
                '</div></div>';
        } else {
            const correctActive = rs === 'correct', wrongActive = rs === 'wrong';
            const cardClass = correctActive ? 'done-correct' : (wrongActive ? 'done-wrong' : '');
            return '<div class="frame-card ' + cardClass + '" id="card_' + frameNum + '">' +
                '<div class="frame-thumb">' +
                '<img id="thumb_' + frameNum + '" src="" alt="Khung hình ' + frameNum + '">' +
                '<div class="frame-num-badge">Khung hình ' + frameNum + '</div>' +
                (correctActive ? '<div class="status-badge-img" style="background:#10B981"><i class="fa-solid fa-check"></i> Đúng</div>' : '') +
                (wrongActive ? '<div class="status-badge-img" style="background:#EF4444"><i class="fa-solid fa-xmark"></i> Sai</div>' : '') +
                '</div>' +
                '<div class="frame-body">' +
                '<div class="frame-desc ' + (desc ? 'review-desc' : 'empty-desc') + '">' + (desc || 'Không có mô tả') + '</div>' +
                '<a href="Label_Review.html?taskId=' + taskId + '&frame=' + frameIdx + '&returnTo=FrameList&mode=review" class="btn-action btn-check" onclick="markVisited(' + frameNum + ')">' +
                '<i class="fa-solid fa-eye"></i> Xem nhãn</a>' +
                (wrongActive ? '<textarea class="feedback-input" id="fb_' + frameNum + '" placeholder="Mô tả lỗi..." oninput="saveFeedback(' + frameNum + ')">' + savedFb + '</textarea>' : '') +
                '</div></div>';
        }
    }).join('');

    frameEntries.forEach(function(entry) {
        const frame = frames[entry.frameNum - 1];
        if (frame) loadThumb(entry.frameNum, frame.id);
    });
}

function setReviewState(frameNum, state) {
    reviewStates[frameNum] = state;
    localStorage.setItem(reviewKey, JSON.stringify(reviewStates));
    renderCards();
    updateProgress();
    checkAutoApprove();
}

function saveFeedback(frameNum) {
    const el = document.getElementById('fb_' + frameNum);
    if (el) { reviewStates['fb_' + frameNum] = el.value; localStorage.setItem(reviewKey, JSON.stringify(reviewStates)); }
}

function checkAutoApprove() {
    if (mode !== 'review' || !frameEntries.length) return;
    const allCorrect = frameEntries.every(function(e) { return reviewStates[e.frameNum] === 'correct'; });
    if (allCorrect) submitTask(true);
}

async function loadThumb(frameNum, frameId) {
    try {
        const res = await fetch(BASE_URL + '/frames/' + frameId + '/image/CAM_FRONT', { headers: { Authorization: 'Bearer ' + getToken() } });
        if (!res.ok) return;
        const blob = await res.blob();
        const img = document.getElementById('thumb_' + frameNum);
        if (img) img.src = URL.createObjectURL(blob);
    } catch(e) {}
}

function markVisited(frameNum) { sessionStorage.setItem('visiting_frame_' + taskId, frameNum); }

function updateProgress() {
    let done = 0;
    if (mode === 'fix') {
        done = frameEntries.filter(function(e) { return doneFrames[e.frameNum]; }).length;
    } else {
        done = frameEntries.filter(function(e) { return reviewStates[e.frameNum]; }).length;
    }
    document.getElementById('doneCount').textContent = done;
    document.getElementById('totalCount').textContent = frameEntries.length;
}

function checkReturnedFrame() {
    const v = sessionStorage.getItem('visiting_frame_' + taskId);
    if (!v) return false;
    const key = 'framelist_saved_' + taskId + '_' + v;
    if (localStorage.getItem(key) === 'true') {
        doneFrames[parseInt(v)] = true;
        localStorage.setItem(storageKey, JSON.stringify(doneFrames));
        localStorage.removeItem(key);
        sessionStorage.removeItem('visiting_frame_' + taskId);
        // Reload reviewStates từ localStorage (label_review.js đã cập nhật)
        try { reviewStates = JSON.parse(localStorage.getItem(reviewKey) || '{}'); } catch(e) {}
        return true;
    }
    return false;
}

window.addEventListener('focus', function() { if (checkReturnedFrame() && task) { renderCards(); updateProgress(); } });
document.addEventListener('visibilitychange', function() { if (!document.hidden && checkReturnedFrame() && task) { renderCards(); updateProgress(); } });

async function submitTask(autoApprove) {
    if (!autoApprove) {
        const done = mode === 'fix'
            ? frameEntries.filter(function(e) { return doneFrames[e.frameNum]; }).length
            : frameEntries.filter(function(e) { return reviewStates[e.frameNum]; }).length;
        if (done < frameEntries.length) {
            showConfirm('Còn ' + (frameEntries.length - done) + ' khung hình chưa xử lý. Vẫn muốn tiếp tục?',
                function() { _doFrameListSubmit(false); },
                { title: 'Xác nhận', confirmText: 'Tiếp tục', type: 'warning' });
            return;
        }
    }
    _doFrameListSubmit(autoApprove);
}

async function _doFrameListSubmit(autoApprove) {
    const btn = document.getElementById('btnSubmit');
    if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang xử lý...'; }

    try {
        if (mode === 'fix') {
            const res = await fetch(BASE_URL + '/tasks/' + taskId + '/submit', {
                method: 'POST',
                headers: { Authorization: 'Bearer ' + getToken(), 'Content-Type': 'application/json' },
                body: JSON.stringify({ time_spent: null })
            });
            if (!res.ok) throw new Error((await res.json()).detail || 'Lỗi nộp bài');
            localStorage.removeItem(storageKey);
            localStorage.removeItem(reviewKey);
            localStorage.removeItem('framelist_mode_' + taskId);
            showToast('Đã nộp lại — người kiểm tra sẽ xem xét', 'success');
        } else {
            const wrongFrames = frameEntries.filter(function(e) { return reviewStates[e.frameNum] === 'wrong'; });
            if (wrongFrames.length > 0) {
                const feedbackLines = wrongFrames.map(function(e) {
                    const fb = (reviewStates['fb_' + e.frameNum] || '').trim() || 'Có lỗi cần sửa';
                    return 'Khung hình ' + e.frameNum + ': ' + fb;
                }).join('\n');
                const res = await fetch(BASE_URL + '/tasks/' + taskId + '/review/reject', {
                    method: 'POST',
                    headers: { Authorization: 'Bearer ' + getToken(), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ feedback: feedbackLines })
                });
                if (!res.ok) throw new Error((await res.json()).detail || 'Lỗi');
                localStorage.removeItem(storageKey);
                localStorage.removeItem(reviewKey);
                localStorage.removeItem('framelist_mode_' + taskId);
                showToast('Đã gửi phản hồi — ' + wrongFrames.length + ' khung hình cần sửa lại', 'success');
            } else {
                const reviewerTime = parseInt(localStorage.getItem('review_timer_' + taskId) || '0');
                const res = await fetch(BASE_URL + '/tasks/' + taskId + '/review/approve', {
                    method: 'POST',
                    headers: { Authorization: 'Bearer ' + getToken(), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reviewer_time_spent: reviewerTime })
                });
                if (!res.ok) throw new Error((await res.json()).detail || 'Lỗi');
                localStorage.removeItem(storageKey);
                localStorage.removeItem(reviewKey);
                localStorage.removeItem('framelist_mode_' + taskId);
                showToast(autoApprove ? 'Tất cả khung hình đều đúng — đã xác nhận!' : 'Đã xác nhận — nhiệm vụ chờ admin phê duyệt', 'success');
            }
        }
        setTimeout(function() { window.location.href = 'dashboard.html'; }, 2000);
    } catch(e) {
        showToast(e.message || 'Lỗi kết nối', 'error');
        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> <span>' + (mode === 'fix' ? 'Nộp lại' : 'Xác nhận') + '</span>'; }
    }
}

function showToast(msg, type) {
    const colors = { success: '#10B981', error: '#EF4444', info: '#2563EB' };
    const icons = { success: 'fa-circle-check', error: 'fa-circle-xmark', info: 'fa-circle-info' };
    const t = document.createElement('div');
    t.style.cssText = 'position:fixed;top:80px;right:16px;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;color:#fff;z-index:9999;background:' + (colors[type] || '#2563EB') + ';box-shadow:0 4px 16px rgba(0,0,0,0.2);display:flex;align-items:center;gap:8px;font-family:Inter,sans-serif';
    t.innerHTML = '<i class="fa-solid ' + (icons[type] || 'fa-circle-info') + '"></i>' + msg;
    document.body.appendChild(t);
    setTimeout(function() { t.remove(); }, 3000);
}

init();
</script>
<script src="../js/avatar-sync.js"></script>
</body>
</html>
