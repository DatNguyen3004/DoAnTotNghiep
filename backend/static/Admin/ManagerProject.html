<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Dự án - NuLabel</title>
    <!-- Font Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/ManagerProject.css">
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-left">
            <a href="#" class="nav-brand">
                <img style="justify-content: center;" src="../image/NuLabel-removebg-preview.png" width="40" height="30">
                <span class="brand-text">NuLabel</span>
            </a>
        </div>

        <div class="nav-right">
            <div id="navAvatar" onclick="window.location.href='Profile.html'" style="cursor:pointer;width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#7C3AED,#2563EB);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden" title="Thông tin cá nhân"></div>
            <div style="width: 1px; height: 24px; background: var(--border-color); margin: 0 4px;"></div>
            <button class="btn-logout" id="btnLogout">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Đăng xuất
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Quản lý Dự án</h1>
        </div>

        <div class="actions-row">
            <button class="btn-create">
                <i class="fa-solid fa-plus"></i> Tạo Dự án Mới
            </button>
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" placeholder="Tìm kiếm dự án hoặc tài liệu...">
            </div>
        </div>

        <div class="project-grid" id="projectGrid">
            <!-- Projects sẽ được load từ API -->
        </div>
    </main>

    <!-- Modal Tạo Dự Án -->
    <div class="modal" id="createProjectModal">
        <div class="modal-backdrop" id="modalBackdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Tạo dự án mới</h2>
                <button class="modal-close" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <div class="modal-body">
                <form id="createProjectForm">
                    <div class="form-group-modal">
                        <label>Tên dự án</label>
                        <input type="text" id="projectName" placeholder="Ví dụ: nuScenes Detection 2024"
                            class="form-control">
                    </div>
                    <div class="form-group-modal">
                        <label>Mô tả</label>
                        <textarea id="projectDesc" placeholder="Mô tả mục tiêu và yêu cầu của dự án..."
                            class="form-control" rows="3"></textarea>
                    </div>
                    <div class="form-group-modal">
                        <label>Ảnh bìa (tùy chọn)</label>
                        <div class="drop-zone" onclick="document.getElementById('coverImageInput').click()"
                            id="coverDropZone">
                            <div class="drop-icon"><i class="fa-regular fa-image"></i></div>
                            <div class="drop-text" id="coverDropText">Tải lên ảnh bìa dự án</div>
                            <div class="drop-subtext">JPG, PNG, WEBP (Tối đa 2MB)</div>
                            <input type="file" id="coverImageInput" accept="image/png,image/jpeg,image/webp" hidden>
                        </div>
                    </div>
                </form>
            </div>

            <div class="modal-footer">
                <button class="btn-cancel" id="cancelModalBtn" type="button">Hủy</button>
                <button class="btn-primary-modal" type="button">Tạo</button>
            </div>
        </div>
    </div>

    <!-- Modal Chỉnh sửa Dự Án -->
    <div class="modal" id="editProjectModal">
        <div class="modal-backdrop" id="editModalBackdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Chỉnh sửa dự án</h2>
                <button class="modal-close" id="closeEditModalBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group-modal">
                    <label>Tên dự án</label>
                    <input type="text" id="editProjectName" class="form-control">
                </div>
                <div class="form-group-modal">
                    <label>Mô tả</label>
                    <textarea id="editProjectDesc" class="form-control" rows="3"></textarea>
                </div>
                <div class="form-group-modal">
                    <label>Ảnh bìa (tùy chọn)</label>
                    <div class="drop-zone" onclick="document.getElementById('editCoverInput').click()"
                        id="editCoverDropZone">
                        <div class="drop-icon"><i class="fa-regular fa-image"></i></div>
                        <div class="drop-text" id="editCoverDropText">Thay đổi ảnh bìa</div>
                        <div class="drop-subtext">JPG, PNG, WEBP</div>
                        <input type="file" id="editCoverInput" accept="image/png,image/jpeg,image/webp" hidden>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="cancelEditModalBtn" type="button">Hủy</button>
                <button class="btn-primary-modal" id="btnSaveEdit" type="button">Lưu</button>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = 'http://localhost:8000/api';

        function getToken() { return localStorage.getItem('access_token'); }

        // Auth guard
        const user = JSON.parse(localStorage.getItem('current_user') || '{}');
        if (!getToken() || user.role !== 'admin') {
            window.location.href = '../login.html';
        }

        // Avatar
        (function() {
            var el = document.getElementById('navAvatar');
            if (!el) return;
            var avatarUrl = user.avatar_url;
            if (avatarUrl) {
                var img = document.createElement('img');
                img.src = avatarUrl.startsWith('http') ? avatarUrl : 'http://localhost:8000' + avatarUrl;
                img.style.cssText = 'width:100%;height:100%;object-fit:cover';
                img.onerror = function() { el.textContent = (user.username||'AD').substring(0,2).toUpperCase(); };
                el.appendChild(img);
            } else {
                el.textContent = (user.username||'AD').substring(0,2).toUpperCase();
            }
        })();

        // Logout
        document.getElementById('btnLogout').addEventListener('click', async () => {
            try { await fetch(`${BASE_URL}/auth/logout`, { method: 'POST', headers: { Authorization: `Bearer ${getToken()}` } }); } catch (e) { }
            localStorage.removeItem('access_token');
            localStorage.removeItem('current_user');
            sessionStorage.clear();
            window.location.href = '../login.html';
        });

        // Banner colors cycle
        const banners = ['bg-dark', 'bg-network', 'bg-teal'];
        const bannerHTML = {
            'bg-dark': `<div class="badge-design"><div class="badge-text1">PROJECT</div><div class="badge-text2">NULABEL</div></div>`,
            'bg-network': `<div class="network-pattern"></div>`,
            'bg-teal': `<div class="teal-overlay"></div><div class="cursive-logo">NuLabel Dataset</div>`
        };

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return `${d.getDate()} Th${d.getMonth() + 1}, ${d.getFullYear()}`;
        }

        function renderProjects(projects) {
            const grid = document.getElementById('projectGrid');
            if (!projects.length) {
                grid.innerHTML = '<p style="color:#94A3B8;padding:24px;">Chưa có dự án nào. Tạo dự án mới để bắt đầu.</p>';
                return;
            }
            grid.innerHTML = projects.map((p, i) => {
                const banner = banners[i % banners.length];
                const bannerContent = p.cover_image
                    ? `<img src="${p.cover_image}" style="width:100%;height:100%;object-fit:cover;">`
                    : bannerHTML[banner];
                const bannerClass = p.cover_image ? '' : banner;
                const hasData = p.scene_count > 0;
                const clickable = hasData ? `onclick="selectProject(${p.id}, '${p.name.replace(/'/g, "\\'")}')" style="cursor:pointer"` : `onclick="alert('Dự án chưa có dữ liệu.')" style="cursor:not-allowed;opacity:0.7"`;
                return `
                <div class="project-card">
                    <div class="card-banner ${bannerClass}" ${clickable}>${bannerContent}</div>
                    <div class="card-content">
                        <h2 class="card-title" ${clickable}>${p.name}</h2>
                        <p class="card-desc">${p.description || 'Không có mô tả.'}</p>
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:auto">
                            <div class="card-footer">
                                <i class="fa-regular fa-calendar"></i>
                                <span>${formatDate(p.created_at)}</span>
                                ${hasData ? `<span style="margin-left:8px;background:#DCFCE7;color:#16A34A;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700">${p.scene_count} nhiệm vụ</span>` : `<span style="margin-left:8px;background:#FEF3C7;color:#D97706;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700">Chưa có dữ liệu</span>`}
                            </div>
                            <div style="display:flex;gap:8px">
                                <button onclick="openEditModal(${p.id},'${p.name.replace(/'/g, "\\'")}','${(p.description || '').replace(/'/g, "\\'")}')" 
                                    style="background:none;border:1px solid #E2E8F0;border-radius:6px;padding:4px 10px;cursor:pointer;color:#64748B;font-size:12px;font-weight:600">
                                    <i class="fa-solid fa-pen"></i>
                                </button>
                                <button onclick="deleteProject(${p.id},'${p.name.replace(/'/g, "\\'")}')" 
                                    style="background:none;border:1px solid #FCA5A5;border-radius:6px;padding:4px 10px;cursor:pointer;color:#EF4444;font-size:12px;font-weight:600">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function selectProject(id, name) {
            sessionStorage.setItem('projectId', id);
            sessionStorage.setItem('projectName', name);
            window.location.href = 'dashboard.html';
        }

        async function loadProjects() {
            try {
                const res = await fetch(`${BASE_URL}/projects`, {
                    headers: { Authorization: `Bearer ${getToken()}` }
                });
                if (!res.ok) throw new Error();
                const projects = await res.json();
                renderProjects(projects);
            } catch (e) {
                document.getElementById('projectGrid').innerHTML = '<p style="color:#EF4444;padding:24px;">Không thể tải danh sách dự án.</p>';
            }
        }

        // Search filter
        document.querySelector('.search-box input').addEventListener('input', function () {
            const q = this.value.toLowerCase();
            document.querySelectorAll('.project-card').forEach(card => {
                const title = card.querySelector('.card-title').textContent.toLowerCase();
                card.style.display = title.includes(q) ? '' : 'none';
            });
        });

        // Modal
        const modal = document.getElementById('createProjectModal');
        const btnCreate = document.querySelector('.btn-create');
        const btnClose = document.getElementById('closeModalBtn');
        const btnCancel = document.getElementById('cancelModalBtn');
        const backdrop = document.getElementById('modalBackdrop');

        btnCreate.addEventListener('click', () => modal.classList.add('active'));
        btnClose.addEventListener('click', () => modal.classList.remove('active'));
        btnCancel.addEventListener('click', () => modal.classList.remove('active'));
        backdrop.addEventListener('click', () => modal.classList.remove('active'));

        document.querySelector('.btn-primary-modal').addEventListener('click', async () => {
            const name = document.getElementById('projectName').value.trim();
            const desc = document.getElementById('projectDesc').value.trim();
            if (!name) { alert('Vui lòng nhập tên dự án.'); return; }

            try {
                const res = await fetch(`${BASE_URL}/projects`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${getToken()}` },
                    body: JSON.stringify({ name, description: desc })
                });
                if (!res.ok) throw new Error();
                const project = await res.json();
                await uploadCover(project.id, document.getElementById('coverImageInput'));
                modal.classList.remove('active');
                document.getElementById('projectName').value = '';
                document.getElementById('projectDesc').value = '';
                document.getElementById('coverDropText').textContent = 'Tải lên ảnh bìa dự án';
                document.getElementById('coverImageInput').value = '';
                loadProjects();
            } catch (e) {
                alert('Tạo dự án thất bại. Vui lòng thử lại.');
            }
        });

        // Preview ảnh khi chọn file
        document.getElementById('coverImageInput').addEventListener('change', function () {
            if (this.files[0]) document.getElementById('coverDropText').textContent = this.files[0].name;
        });
        document.getElementById('editCoverInput').addEventListener('change', function () {
            if (this.files[0]) document.getElementById('editCoverDropText').textContent = this.files[0].name;
        });

        async function uploadCover(projectId, fileInput) {
            if (!fileInput.files[0]) return;
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            await fetch(`${BASE_URL}/projects/${projectId}/cover`, {
                method: 'POST',
                headers: { Authorization: `Bearer ${getToken()}` },
                body: formData
            });
        }
        async function deleteProject(id, name) {
            showConfirm(`Xóa dự án "${name}"? Hành động này không thể hoàn tác.`, async () => {
                try {
                    const res = await fetch(`${BASE_URL}/projects/${id}`, {
                        method: 'DELETE',
                        headers: { Authorization: `Bearer ${getToken()}` }
                    });
                    if (!res.ok) throw new Error();
                    loadProjects();
                } catch (e) {
                    alert('Xóa dự án thất bại.');
                }
            }, { title: 'Xóa dự án', confirmText: 'Xóa', type: 'danger' });
        }

        // Edit modal
        const editModal = document.getElementById('editProjectModal');
        let editingProjectId = null;

        function openEditModal(id, name, desc) {
            editingProjectId = id;
            document.getElementById('editProjectName').value = name;
            document.getElementById('editProjectDesc').value = desc;
            editModal.classList.add('active');
        }

        document.getElementById('closeEditModalBtn').addEventListener('click', () => editModal.classList.remove('active'));
        document.getElementById('cancelEditModalBtn').addEventListener('click', () => editModal.classList.remove('active'));
        document.getElementById('editModalBackdrop').addEventListener('click', () => editModal.classList.remove('active'));

        document.getElementById('btnSaveEdit').addEventListener('click', async () => {
            const name = document.getElementById('editProjectName').value.trim();
            const desc = document.getElementById('editProjectDesc').value.trim();
            if (!name) { alert('Vui lòng nhập tên dự án.'); return; }
            try {
                const res = await fetch(`${BASE_URL}/projects/${editingProjectId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${getToken()}` },
                    body: JSON.stringify({ name, description: desc })
                });
                if (!res.ok) throw new Error();
                await uploadCover(editingProjectId, document.getElementById('editCoverInput'));
                editModal.classList.remove('active');
                document.getElementById('editCoverInput').value = '';
                document.getElementById('editCoverDropText').textContent = 'Thay đổi ảnh bìa';
                loadProjects();
            } catch (e) {
                alert('Cập nhật dự án thất bại.');
            }
        });

        loadProjects();
    </script>
    <script src="../js/confirm.js"></script>

<script src="../js/avatar-sync.js"></script>
</body>

</html>
