<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin cá nhân - NuLabel</title>
    <!-- Font Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/setting.css">
    <style>
        .profile-card { display:flex; gap:32px; background:#fff; border-radius:16px; border:1px solid #E2E8F0; padding:32px; max-width:800px; }
        .avatar-section { width:200px; flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:12px; }
        .avatar-preview-container { width:120px; height:120px; border-radius:50%; overflow:hidden; background:#EEF2FF; display:flex; align-items:center; justify-content:center; }
        .avatar-preview { width:100%; height:100%; object-fit:cover; }
        .btn-change-photo { padding:8px 16px; background:#F1F5F9; border:1px solid #E2E8F0; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:Inter,sans-serif; transition:all 0.2s; }
        .btn-change-photo:hover { background:#E2E8F0; }
        .avatar-hint { font-size:11px; color:#94A3B8; text-align:center; line-height:1.4; }
        .form-section { flex:1; }
        .form-grid { display:flex; flex-direction:column; gap:16px; }
        .form-group { display:flex; flex-direction:column; gap:6px; }
        .form-group.half { display:inline-flex; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
        .form-group label { font-size:12px; font-weight:700; color:#64748B; text-transform:uppercase; letter-spacing:0.5px; }
        .form-group input, .form-group select, .form-group textarea { padding:10px 14px; border:1px solid #E2E8F0; border-radius:10px; font-size:14px; font-family:Inter,sans-serif; color:#1E293B; outline:none; transition:border 0.2s; background:#fff; width:100%; box-sizing:border-box; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:#2563EB; }
        .form-group input:disabled, .form-group select:disabled, .form-group textarea:disabled { background:#F8FAFC; color:#94A3B8; cursor:not-allowed; }
        .form-footer { display:flex; gap:12px; justify-content:flex-end; margin-top:24px; padding-top:20px; border-top:1px solid #E2E8F0; }
        .btn-back { height:40px; padding:0 20px; background:#F1F5F9; color:#475569; border:none; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; font-family:Inter,sans-serif; text-decoration:none; display:flex; align-items:center; gap:8px; }
        .btn-back:hover { background:#E2E8F0; }
        .btn-save { height:40px; padding:0 24px; background:#2563EB; color:#fff; border:none; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; font-family:Inter,sans-serif; display:flex; align-items:center; gap:8px; }
        .btn-save:hover { background:#1D4ED8; }
        .page-header { margin-bottom:24px; }
        .page-header h1 { font-size:22px; font-weight:800; color:#1E293B; }
        .page-header p { font-size:13px; color:#64748B; margin-top:4px; }
        .profile-content { padding:32px; }
    </style>
</head>

<body>

<main class="main-wrapper" id="mainWrapper">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <div class="sidebar-badge" id="sideProjectBadge">
                <img id="sideProjectLogo" src="" style="width:100%; height:100%; object-fit:cover; display:none;">
                <div id="sideProjectText" style="display:flex; flex-direction:column; align-items:center;">
                    <span class="badge-t1">PROJECT</span>
                    <span class="badge-t2">NULABEL</span>
                </div>
            </div>
            <div class="btn-toggle-sidebar" id="toggleSidebar" title="Thu gọn / Mở rộng">
                <i class="fa-solid fa-chevron-left"></i>
            </div>
        </div>
        <nav class="sidebar-nav" style="padding-top: 24px;">
            <h2 class="sidebar-title" id="sideProjectName" style="margin-bottom: 16px; padding: 0 16px;">Trang chủ</h2>
            <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-house"></i><span>Trang chủ</span></a>
            <a href="ManagerUser.html" class="nav-item"><i class="fa-solid fa-users"></i><span>Quản lý người dùng</span></a>
            <a href="setting.html" class="nav-item"><i class="fa-solid fa-gear"></i><span>Cài đặt</span></a>
        </nav>
        <div class="sidebar-bottom">
            <a href="ManagerProject.html" class="nav-item exit-nav">
                <i class="fa-solid fa-arrow-right-from-bracket"></i><span>Thoát dự án</span>
            </a>
        </div>
    </aside>

    <header class="topnav">
        <div class="topnav-brand">NuLabel</div>
        <div class="topnav-right">
            <i class="fa-regular fa-bell topnav-icon"></i>
            <i class="fa-regular fa-circle-question topnav-icon"></i>
            <a href="Profile.html">
                <img src="https://api.dicebear.com/7.x/notionists/svg?seed=Felix&backgroundColor=e2e8f0"
                    alt="Avatar" class="avatar" id="topnavAvatar">
            </a>
        </div>
    </header>

    <div class="profile-content">
        <div class="page-header">
            <h1>Thông tin cá nhân</h1>
            <p>Cập nhật thông tin hồ sơ của bạn và quản lý các tùy chọn tài khoản.</p>
        </div>

        <div class="profile-card">
            <div class="avatar-section">
                <h3>Ảnh đại diện</h3>
                <div class="avatar-preview-container">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Khang&style=transparent" alt="Avatar" class="avatar-preview">
                </div>
                <button class="btn-change-photo">Thay đổi ảnh</button>
                <p class="avatar-hint">Khuyến nghị file .jpg hoặc .png, kích thước tối thiểu 400×400px.</p>
            </div>

            <div class="form-section">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Họ và Tên</label>
                        <input type="text" id="pFullName" placeholder="Nguyễn Văn A">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="pEmail" placeholder="user@nulabel.vn">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Giới tính</label>
                            <select id="pGender">
                                <option value="Nam">Nam</option>
                                <option value="Nữ">Nữ</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Ngày sinh</label>
                            <input type="date" id="pBirthDate">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Số điện thoại</label>
                        <input type="text" id="pPhone" placeholder="0988 123 456">
                    </div>
                    <div class="form-group">
                        <label>Địa chỉ</label>
                        <textarea id="pAddress" rows="2" placeholder="Địa chỉ của bạn"></textarea>
                    </div>
                </div>
                <div class="form-footer">
                    <a href="javascript:history.back()" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Quay lại</a>
                    <button class="btn-save"><i class="fa-solid fa-floppy-disk"></i> Lưu thay đổi</button>
                </div>
            </div>
        </div>
    </div>

</main>

<script src="../js/profile.js"></script>
</body>
</html>
