<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - NuLabel</title>
    <!-- Font Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4B638A; /* Muted navy blue */
            --primary-hover: #3A4F72;
            --bg-page: #F8FAFC;
            --bg-card: #FFFFFF;
            --text-title: #111827;
            --text-subtitle: #64748B;
            --text-label: #94A3B8; /* Light gray label color used in mock */
            --text-input: #1E293B;
            --text-placeholder: #CBD5E1;
            --border-color: #E2E8F0;
            --input-bg: #F8FAFC;
            --transition: all 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-page);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-title);
            padding: 20px;
        }

        .signup-container {
            width: 100%;
            max-width: 460px; /* Slightly wider than login if needed, or keeping it the same */
        }

        .signup-card {
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(226, 232, 240, 0.8);
            padding: 40px;
            width: 100%;
        }

        .signup-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .brand-container svg {
            width: 48px;
            height: 48px;
        }

        .signup-title {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-title);
            letter-spacing: -0.5px;
        }

        .signup-subtitle {
            font-size: 13.5px;
            color: var(--text-subtitle);
            line-height: 1.5;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #64748B; /* Darker than placeholder, slightly lighter than input text */
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 18px;
        }
        
        .form-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon-left {
            position: absolute;
            left: 14px;
            color: #94A3B8;
            font-size: 14px;
            pointer-events: none;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 16px; /* consistent width for alignment */
        }

        .form-group input {
            width: 100%;
            height: 44px;
            padding: 0 16px 0 42px; /* Padding for left icon */
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--input-bg);
            font-size: 14px;
            color: var(--text-input);
            outline: none;
            transition: var(--transition);
            font-weight: 500;
        }

        .form-group input::placeholder {
            color: #94A3B8;
            font-weight: 400;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(75, 99, 138, 0.1);
            background-color: #fff;
        }

        /* Update icon color when input is focused */
        .form-group input:focus + .input-icon-left,
        .input-wrapper:focus-within .input-icon-left {
            color: var(--primary-color);
        }

        .btn-submit {
            width: 100%;
            height: 44px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 8px;
            margin-bottom: 24px;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(75, 99, 138, 0.2);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin-bottom: 24px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .divider span {
            padding: 0 16px;
            color: var(--text-subtitle);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .social-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }

        .btn-social {
            flex: 1;
            height: 44px;
            background-color: #fff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-title);
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }

        .btn-social:hover {
            background-color: var(--bg-page);
            border-color: #cbd5e1;
            transform: translateY(-1px);
        }

        .btn-social img, .btn-social svg {
            width: 18px;
            height: 18px;
        }

        .signup-footer {
            text-align: center;
            font-size: 13px;
            color: var(--text-subtitle);
            font-weight: 500;
        }

        .signup-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 700;
            margin-left: 4px;
            transition: var(--transition);
        }

        .signup-footer a:hover {
            text-decoration: underline;
            color: var(--primary-hover);
        }

        /* Mobile adjustments */
        @media (max-width: 480px) {
            .signup-card {
                padding: 32px 20px;
            }
            .form-row {
                flex-direction: column;
                gap: 18px;
            }
            .social-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="signup-container">
        <div class="signup-card">
            <div class="signup-header">
                <!-- Branding next to each other -->
                <div class="brand-container">
                    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- Background Frames -->
                        <path d="M22 46L46 46L46 22L22 22L22 46Z" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.5"/>
                        <path d="M26 50L50 50L50 26L26 26L26 50Z" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
                        <path d="M18 42L42 42L42 18L18 18L18 42Z" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2"/>
                        
                        <!-- Network / Nodes inside front frame -->
                        <path d="M24 24L36 28M36 28L32 36M36 28L40 22M24 24L22 34M32 36L40 38" stroke="#1D4ED8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="24" cy="24" r="2.5" fill="#1D4ED8"/>
                        <circle cx="36" cy="28" r="2.5" fill="#1D4ED8"/>
                        <circle cx="32" cy="36" r="2.5" fill="#1D4ED8"/>
                        <circle cx="40" cy="22" r="2.5" fill="#1D4ED8"/>
                        <circle cx="22" cy="34" r="2.5" fill="#1D4ED8"/>
                        <circle cx="40" cy="38" r="2.5" fill="#1D4ED8"/>
                    </svg>
                    <h1 class="signup-title">NuLabel</h1>
                </div>
                <p class="signup-subtitle">Đăng ký tài khoản để bắt đầu quản lý nhãn dữ liệu</p>
            </div>

            <form action="#" method="POST" id="signupForm">
                
                <div class="form-group">
                    <label for="fullname">Họ và tên</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user input-icon-left"></i>
                        <input type="text" id="fullname" name="fullname" placeholder="Nguyễn Văn A" required>
                    </div>
                </div>

                <!-- Note: The mock had a typo 'TÊN ĐĂNG NHBP', using correct 'TÊN ĐĂNG NHẬP' -->
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-address-card input-icon-left"></i>
                        <input type="text" id="username" name="username" placeholder="username123" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope input-icon-left"></i>
                        <input type="email" id="email" name="email" placeholder="example@nulabel.ai" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Mật khẩu</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock input-icon-left"></i>
                            <input type="password" id="password" name="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <!-- Note: The mock had a typo 'XÁC NHBN', using 'XÁC NHẬN' -->
                    <div class="form-group">
                        <label for="confirm_password">Xác nhận</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-shield-halved input-icon-left"></i>
                            <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Đăng ký ngay</button>
            </form>

            <div class="divider">
                <span>Hoặc đăng ký bằng</span>
            </div>

            <div class="social-buttons">
                <button type="button" class="btn-social">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                    Google
                </button>
                <button type="button" class="btn-social">
                    <svg viewBox="0 0 24 24" fill="#111827" xmlns="http://www.w3.org/2000/svg">
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.45-1.15-1.11-1.46-1.11-1.46-.9-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0012 2z"/>
                    </svg>
                    GitHub
                </button>
            </div>

            <div class="signup-footer">
                Đã có tài khoản? <a href="login.html">Đăng nhập</a>
            </div>
        </div>
    </div>

</body>
</html>
